body:
  text: 明菩薩沙彌古吳智旭述行者淨身口意至尊像前應念我及衆生積迷造罪無救無歸大士洪慈為歸為救又念大士法身及十方三寶體常遍滿無所不在與我現前心性平等無二起深信解如奉慈顏敷具拱立唱云一切恭敬一心頂禮十方常住三寶總一禮已嚴持香華如法供養唱云願此香華雲遍滿十方界供養一切佛尊法諸賢聖無邊佛土中受用作佛事至此停唱燒香散華至心想云一切佛法僧寶體常遍滿無所不在願令以此香華等同法性普熏一切諸佛剎土施作佛事十方一切供具無時不有我今當以十方所有一切種種香華瓔珞幢幡寶蓋諸珍妙飾種種音樂燈明燭火飲食衣服臥具湯藥乃至盡十方所有一切種種莊嚴供養之具憶想遙擬普共衆生奉獻供養一切世界中有修供養者我今隨喜若未修供養者願得開導令修供養又願我身速能遍至一切剎土於一一佛法僧所各以一切種莊嚴供養之具共一切衆生等持奉獻供養一切諸佛法身色身舍利形像浮圖廟塔一切佛事供養一切所有法藏及説法處供養一切賢聖僧衆願共一切衆生修行如是供養已漸得成就六波羅蜜四無量心深知一切法本來寂靜無生無滅一味平等離念清淨畢竟圓滿想已起云供養已一切恭敬一禮已次復合掌讚云南無地藏菩薩摩訶薩以神通力現聲聞像是諸微妙功德伏藏是諸解脫珍寶出處是諸菩薩明淨眼目是趨涅槃商人導首如如意珠雨衆財寶隨所希求皆令滿足照行善者猶如朗日照失道者猶如明炬除煩惱熱如月清涼渡四流者為作橋梁趨彼岸者為作船筏伏諸外道如師子王降諸天魔如大龍象護諸怖畏如親如友防諸怨敵如塹如城救諸危難猶如父母藏諸怯劣猶若叢林令諸有情善根不壞現妙境界令衆欣悅勸發有情增上慚愧求福慧者令具莊嚴能無功用轉大法輪殊勝功德不能測量久修堅固大願大悲勇猛精進過諸菩薩於一食頃至心歸依稱名念誦禮拜供養能令一切皆離憂苦求諸所願速得滿足安置生天涅槃之道故我一心歸命頂禮讚已一禮添香致敬唱云一心頂禮本師釋迦牟尼如來拜下想云能禮所禮性空寂感應道交難思議我此道場如帝珠釋迦如來影現中我身影現如來前頭面接足歸命禮下皆準此唯改佛名一心頂禮過去師子奮迅具足萬行如來覺華定自在王如來一心頂禮一切智成就如來清淨蓮華目如來一心頂禮無邊身如來寶性如來波頭摩勝如來師子吼如來一心頂禮寶勝如來寶相如來袈裟幢如來大通山王如來一心頂禮淨月佛山王佛智勝佛淨明王佛智成就佛無上佛妙聲佛滿月佛月面佛如是等不可説諸佛如來一心頂禮拘留孫佛毗婆尸佛等七佛如來一心頂禮普光佛等五十三佛如來一心頂禮過去殑伽沙等諸佛如來一心頂禮忉利天宮十方集會無量世界不可説不可説一切諸佛如來一心頂禮未來淨住世界安樂劫中無相如來及十方三世一切諸佛如來一心頂禮十方一切諸佛所有色身舍利形像浮圖廟塔一切佛事想云諸佛法身如虗空化事住世難思議我皆影現化事前一一皆悉歸命禮一心頂禮地藏菩薩本願經大乘大集地藏十輪經占察善惡業報經及十方三世一切法藏總三禮想云真空法界如虗空常住法寶難思議我皆影現法寶前莫不皆悉歸命禮一心頂禮文殊師利菩薩財首菩薩定自在王菩薩摩訶薩想偈如佛但改菩薩名字下皆倣此一心頂禮無盡意菩薩解脫菩薩普賢菩薩摩訶薩一心頂禮普廣菩薩觀世音菩薩虗空藏菩薩摩訶薩一心頂禮好疑問菩薩彌勒菩薩金剛藏菩薩堅淨信菩薩摩訶薩一心頂禮十方三世一切菩薩摩訶薩一心頂禮憍陳那尊者優波離尊者目乾連尊者一切聲聞緣覺賢聖僧一心頂禮忉利宮中分身來集地藏菩薩摩訶薩一心頂禮大集會中現聲聞相地藏菩薩摩訶薩一心頂禮占察經中善安慰説地藏菩薩摩訶薩一心頂禮入能發智定地藏菩薩摩訶薩一心頂禮入具足無邊智定地藏菩薩摩訶薩一心頂禮入具足清淨智定地藏菩薩摩訶薩一心頂禮入具足慚愧智定地藏菩薩摩訶薩一心頂禮入具足諸乘明定地藏菩薩摩訶薩一心頂禮入無憂神通明定地藏菩薩摩訶薩一心頂禮入具足勝通明定地藏菩薩摩訶薩一心頂禮入普照諸世間定地藏菩薩摩訶薩一心頂禮入諸佛燈炬明定地藏菩薩摩訶薩一心頂禮入金剛光定地藏菩薩摩訶薩一心頂禮入智力難推伏定地藏菩薩摩訶薩一心頂禮入電光明定地藏菩薩摩訶薩一心頂禮入具足上妙味定地藏菩薩摩訶薩一心頂禮入具足勝精氣定地藏菩薩摩訶薩一心頂禮入上妙諸資具定地藏菩薩摩訶薩一心頂禮入無諍智定地藏菩薩摩訶薩一心頂禮入能引勝踴躍定地藏菩薩摩訶薩一心頂禮入具足世路光定地藏菩薩摩訶薩一心頂禮入善住勝金剛定地藏菩薩摩訶薩一心頂禮入增上觀勝幢定地藏菩薩摩訶薩一心頂禮入具足慈悲聲定地藏菩薩摩訶薩一心頂禮入引集諸福德定地藏菩薩摩訶薩一心頂禮入海電光定地藏菩薩摩訶薩一心頂禮能入如是殑伽沙等諸定成熟一切有情地藏菩薩摩訶薩一心頂禮以諸定力除刀兵劫地藏菩薩摩訶薩一心頂禮以諸定力除疾病劫地藏菩薩摩訶薩一心頂禮以諸定力除飢饉劫地藏菩薩摩訶薩禮竟如前想偈畢復作是念我及衆生無始常為三業六根重罪所障不見諸佛不知出要但順生死不知妙理我今雖知猶與衆生同為一切重罪所障今對地藏十方佛前普為衆生歸命懺悔惟願加護令障消滅作是念已胡跪唱言普為法界一切衆生悉願斷除三障歸命懺悔唱已五體投地復作是念我與衆生無始來今繇愛見故內計我人一外加惡友二不隨喜他一毫之善三惟遍三業廣造衆罪四事雖不廣惡心遍布五晝夜相續無有間斷六覆諱過失不欲人知七不畏惡道八無慚無愧九撥無因果十故於今日深信因果一生重慚愧二生大怖畏三發露懺悔四斷相續心五發菩提心斷惡修善六勤䇿三業翻昔重過七隨喜凡聖一毫之善八念十方佛有大福慧能救拔我及諸衆生從二死海置三德岸九從無始來不知諸法本性空寂廣造衆惡今知空寂為求菩提為衆生故廣修諸善遍斷衆惡十惟願地藏慈悲攝受作是念已應起胡跪唱言至心懺悔我弟子某甲與法界衆生自迷法性枉受輪回無明覆心不知出要懷聰明慢自實愚癡聞大乘法謬生空解撥無因果斷滅善根遠離正信遠離正願離正意樂及以正見遠善知識好處好時遠離淨戒正定正慧隨逐惡友起諸邪見造身語意無量罪業或復毀謗大乘正法或復毀謗獨覺乘法或復毀謗聲聞乘法障弊隱沒不令流布或復於彼諸佛弟子若是法器若非法器具戒破戒下至無戒著片袈裟剃鬚髮者多行忿恨訶罵毀辱譏刺誹謗隱善揚惡以粗惡言期尅迫愶打棒傷害侵奪依鉢侵奪資生絶其飲食退令還俗脫其袈裟枷鎖繫縛禁閉牢獄輕慢觸惱令不安樂奪窣堵波及僧祇物十惡五逆至一闡提乘此業緣於無量劫墮諸惡趣備歷三塗受種種苦楚痛難言設得值遇無量諸佛及大菩薩親承供養發露懺除復更護持無量道法修學無量難行苦行由彼業障有餘未盡令我等輩未能證得安樂涅槃未能證得三摩地門殊勝功德今向地藏菩薩摩訶薩及諸佛世尊發大乘心弘如來教為令此土三寶種性威德熾盛久住世故為欲摧滅一切衆生堅固煩惱令無餘故與諸衆生復深慚愧發露懺悔求悉消除惟願十方諸大慈尊及地藏大士哀愍覆護濟拔我等令此罪障皆得除滅永不復受惡趣苦果我等今者對世尊前及與大士以至誠心發真誓願從今以去乃至菩提常願不遇如是惡緣決定不造如是重罪終不毀謗諸佛正法亦不觸惱諸出家人必不挑壞衆生法眼亦不斷滅三寶種性惟願世尊及與大士攝受證知所發誓願令我等早成十法及成十輪獲得無罪正路法忍於三乘法若三乘人及非法器得無誤失於大乘法升進無轉利慧勝福常得增長於一切定諸陀羅尼諸忍諸地速得自在常得值遇諸善知識常得不離見一切佛及諸菩薩聲聞弟子不離聞法不離親近供養衆僧於諸善根常能精進菩提行願無厭足心先所造惡摧壞散滅速能證得無上法輪善巧方便成熟衆生皆令獲得利益安樂或一説或三説起立唱云懺悔發願已歸命禮三寶一禮已起立正身運想一切三寶遍滿虗空安坐法座一一回身如法旋繞此身如影音聲如響普遍十方上供三寶下警羣靈勿令心散和雅唱云南無十方佛南無十方法南無十方僧南無本師釋迦牟尼佛南無地藏菩薩本願經南無大乘大集地藏十輪經南無占察善惡業報經南無地藏菩薩摩訶薩或三稱或七稱旋繞既畢回身至法座前正立至心唱云自歸依佛當願衆生體解大道發無上心自歸依法當願衆生深入經藏智慧如海自歸依僧當願衆生統理大衆一切無礙和南聖衆問訊畢次至靜室或念地藏菩薩名或持滅定業真言或觀大士平等法身或作唯心識等二種觀道唯信唯篤則必能滅障必證法忍矣後序嗚呼大法久湮人多謬解執大謗小舉世皆然寧知地獄衆苦已隨其後瘖啞餘報復更難窮故我地藏慈尊於大集會中現聲聞相而世尊廣歎勝德且為之較量云假使有人於彌勒妙吉祥并觀自在普賢之類殑伽沙等大菩薩所於百劫中至心歸依稱念禮供求諸所願不如有人於一食頃歸依稱念禮供地藏以菩薩久修堅固大願大悲勇猛精進過諸菩薩故也蓋末世之中駕言於大乘甚易而躬行於僧行實難寧知廢小談大并其大而亦非悟大用小并其小而亦大故法華誡弘經者必依四安樂行涅槃極談常住佛性尤扶戒律今大士之功德獨盛得非亦在此乎智旭深恨夙生惡習少年力詆三寶造無間罪賴善根未殞得聞本願尊經知有出世大孝乃轉邪見而生正信仍以謗法餘業雖辛勤修證不登法忍每一展讀大士三經輒不禁涕泗橫流悲昔日之無知感大士之拯也因念濁智流轉之日與我同此過者不少敬宗十輪并占察本願二典述此儀法庶幾共滌先愆克求後果不終為無依行乎未登無生正位皆可修之無論初心與久學也崇禎丁丑後自恣前十日菩薩沙彌智旭識於九子別峯之梵網室呪壇中
